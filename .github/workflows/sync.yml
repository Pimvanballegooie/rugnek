name: Sync protocollen vanuit Google Docs
on:
  schedule:
    - cron: '0 3 * * *'   # Elke nacht om 03:00 UTC
  workflow_dispatch:        # Handmatig starten mogelijk
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Sync protocollen
        run: python3 sync_protocollen.py
      - name: Commit wijzigingen
        run: |
          git config user.name "Rug Nek Bot"
          git config user.email "bot@rugnek.net"
          git add protocollen/ protocollen.html sitemap.xml
          git diff --staged --quiet || git commit -m "Automatische sync protocollen vanuit Google Docs"
          git push
